name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not report vulnerabilities here. Follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Jambavan version
      description: Run `npx jambavan --version` from the affected setup, or provide its pinned package version.
    validations:
      required: true
  - type: dropdown
    id: host
    attributes:
      label: MCP host
      options:
        - Claude Code
        - Cursor
        - Codex
        - Continue
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, and Node version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps, expected behavior, and actual behavior. Remove private paths, source, memory, and secrets.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized diagnostics
      description: Relevant `jambavan_doctor` output or errors with sensitive data removed
