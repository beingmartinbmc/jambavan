<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">30-second Jambavan demo</title>
  <desc id="desc">A five-step terminal storyboard: register Jambavan, run doctor, index the repo, fetch context, and reuse memory and failure history.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#172554"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="180" fill="#f59e0b" opacity="0.12"/>
  <circle cx="145" cy="620" r="240" fill="#22c55e" opacity="0.10"/>

  <text x="600" y="76" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="800" fill="#f8fafc">Stop your coding agent from forgetting your repo</text>
  <text x="600" y="112" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#cbd5e1">Local MCP memory, indexed context, failure history, and review packs in 30 seconds</text>

  <g filter="url(#shadow)">
    <rect x="82" y="144" width="1036" height="500" rx="24" fill="#0b1020"/>
    <rect x="82" y="144" width="1036" height="54" rx="24" fill="#151b2e"/>
    <path d="M82 174 h1036 v24 h-1036 z" fill="#151b2e"/>
    <circle cx="118" cy="171" r="8" fill="#ef4444"/>
    <circle cx="148" cy="171" r="8" fill="#f59e0b"/>
    <circle cx="178" cy="171" r="8" fill="#22c55e"/>
    <text x="600" y="177" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#a7b0c8">jambavan demo</text>

    <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">
      <rect x="116" y="226" width="184" height="40" rx="20" fill="#2563eb"/>
      <text x="208" y="252" text-anchor="middle" fill="#ffffff">1 register</text>
      <rect x="316" y="226" width="184" height="40" rx="20" fill="#334155"/>
      <text x="408" y="252" text-anchor="middle" fill="#ffffff">2 doctor</text>
      <rect x="516" y="226" width="184" height="40" rx="20" fill="#334155"/>
      <text x="608" y="252" text-anchor="middle" fill="#ffffff">3 index</text>
      <rect x="716" y="226" width="184" height="40" rx="20" fill="#334155"/>
      <text x="808" y="252" text-anchor="middle" fill="#ffffff">4 context</text>
      <rect x="916" y="226" width="154" height="40" rx="20" fill="#334155"/>
      <text x="993" y="252" text-anchor="middle" fill="#ffffff">5 recall</text>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">
      <text x="124" y="322" fill="#60a5fa">$ claude mcp add jambavan -- npx -y jambavan</text>
      <text x="124" y="358" fill="#94a3b8">Registered MCP server: jambavan</text>
      <text x="124" y="412" fill="#60a5fa">$ npx jambavan doctor</text>
      <text x="124" y="448" fill="#94a3b8">Project root: /repo/app (source: env) · no LLM calls · writes off</text>
      <text x="124" y="502" fill="#60a5fa">$ jambavan_index &amp;&amp; jambavan_context query="auth middleware"</text>
      <text x="124" y="538" fill="#94a3b8">Indexed symbols → ranked snippets, callers, tests, and recent diff</text>
      <text x="124" y="592" fill="#60a5fa">$ jambavan_failure_search query="flaky auth test"</text>
      <text x="124" y="628" fill="#f8fafc">Do not retry the timeout bump; root cause was an unawaited promise.</text>
    </g>
  </g>
</svg>
