name: Jambavan PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build jambavan from source
        run: |
          npm ci
          npm run build

      - name: Run jambavan review pack
        id: pack
        run: |
          node dist/index.js review-pack \
            --base "origin/${{ github.event.pull_request.base.ref }}" \
            --format json \
            --max-files 200 \
            > /tmp/review-pack.json
        env:
          JAMBAVAN_ROOT: ${{ github.workspace }}

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- jambavan-review -->';
            let raw;
            try {
              raw = fs.readFileSync('/tmp/review-pack.json', 'utf8');
            } catch (err) {
              core.setFailed(`Review pack output missing at /tmp/review-pack.json — the review-pack step did not produce a file. ${err.message}`);
              return;
            }
            let pack;
            try {
              pack = JSON.parse(raw);
            } catch (err) {
              core.setFailed(`Review pack output is not valid JSON: ${err.message}\n--- first 500 chars ---\n${raw.slice(0, 500)}`);
              return;
            }

            const body = buildComment(pack, context.payload.pull_request);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            function buildComment(pack, pr) {
              const touched = pack.touchedCount ?? 0;
              const analyzed = pack.analyzedCount ?? pack.files?.length ?? 0;
              const fileSummary = pack.truncated
                ? `${touched} (analyzed ${analyzed})`
                : `${touched}`;
              const lines = [
                MARKER,
                '## 🐻 Jambavan Review Pack',
                '',
                `**Base:** \`${pack.base || pr.base.ref}\`  ·  **Touched files:** ${fileSummary}`,
                '',
              ];

              if (pack.files && pack.files.length > 0) {
                lines.push('### Blast Radius');
                for (const f of pack.files) {
                  lines.push(`<details><summary><b>${f.status} ${f.path}</b>${f.risks?.length ? ' ⚠️' : ''}</summary>`);
                  lines.push('');
                  if (f.symbols?.length) {
                    for (const sym of f.symbols) {
                      lines.push(`- **\`${sym.name}\`** (${sym.type}, L${sym.startLine})`);
                      if (sym.callers?.length) {
                        lines.push(`  - Callers: ${sym.callers.slice(0, 5).join(', ')}${sym.callers.length > 5 ? ` +${sym.callers.length - 5} more` : ''}`);
                      }
                      if (sym.tests?.length) {
                        lines.push(`  - Tests: ${sym.tests.join(', ')}`);
                      }
                    }
                  } else {
                    lines.push('_No indexed symbols_');
                  }
                  if (f.risks?.length) {
                    lines.push('');
                    lines.push(`**⚠ Risks:** ${f.risks.join('; ')}`);
                  }
                  lines.push('</details>');
                  lines.push('');
                }
              }

              if (pack.rinMarkers?.length) {
                lines.push('### Rin Debt Touched');
                for (const m of pack.rinMarkers) {
                  lines.push(`- \`${m.file}:${m.line}\`: ${m.comment}${m.hasUpgrade ? '' : ' _(no upgrade trigger)_'}`);
                }
                lines.push('');
              }

              if (pack.failures?.length) {
                lines.push('### Failure Immunity');
                for (const f of pack.failures) {
                  lines.push(`- **${f.title}** — ${f.status}`);
                }
                lines.push('');
              }

              lines.push('---');
              lines.push(`<sub>Analyzed by [Jambavan](https://github.com/sharma-ankit2/jambavan) · local-first MCP memory for coding agents · no LLM calls · no telemetry</sub>`);
              return lines.join('\n');
            }
