<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Jambavan GUI visualizer screenshot</title>
  <desc id="desc">A browser-style screenshot of the local Jambavan GUI showing graph, Rin Debt, and Failures tabs.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#164e63"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="34" fill="url(#page)"/>
  <circle cx="180" cy="160" r="180" fill="#38bdf8" opacity="0.10"/>
  <circle cx="1010" cy="570" r="220" fill="#f59e0b" opacity="0.11"/>

  <g filter="url(#shadow)">
    <rect x="82" y="64" width="1036" height="592" rx="24" fill="#f8fafc"/>
    <rect x="82" y="64" width="1036" height="58" rx="24" fill="#e2e8f0"/>
    <path d="M82 98 h1036 v24 h-1036 z" fill="#e2e8f0"/>
    <circle cx="120" cy="94" r="8" fill="#ef4444"/>
    <circle cx="150" cy="94" r="8" fill="#f59e0b"/>
    <circle cx="180" cy="94" r="8" fill="#22c55e"/>
    <text x="600" y="100" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#475569">http://127.0.0.1:4173</text>

    <text x="122" y="160" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Jambavan Local Graph</text>
    <text x="122" y="192" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#475569">/repo/jambavan · 216 nodes, 502 edges · generated locally</text>

    <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600">
      <rect x="122" y="224" width="106" height="34" rx="17" fill="#0f172a"/>
      <text x="175" y="246" text-anchor="middle" fill="#ffffff">Graph</text>
      <rect x="238" y="224" width="116" height="34" rx="17" fill="#e2e8f0"/>
      <text x="296" y="246" text-anchor="middle" fill="#334155">Rin Debt</text>
      <rect x="364" y="224" width="110" height="34" rx="17" fill="#e2e8f0"/>
      <text x="419" y="246" text-anchor="middle" fill="#334155">Failures</text>
    </g>

    <g stroke="#94a3b8" stroke-width="2" opacity="0.8">
      <line x1="344" y1="390" x2="512" y2="306"/>
      <line x1="512" y1="306" x2="700" y2="360"/>
      <line x1="512" y1="306" x2="608" y2="508"/>
      <line x1="700" y1="360" x2="850" y2="294"/>
      <line x1="700" y1="360" x2="900" y2="484"/>
      <line x1="608" y1="508" x2="900" y2="484"/>
      <line x1="344" y1="390" x2="608" y2="508"/>
    </g>

    <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">
      <circle cx="344" cy="390" r="46" fill="#2563eb"/>
      <text x="344" y="396" text-anchor="middle" fill="#ffffff">context</text>
      <circle cx="512" cy="306" r="54" fill="#0f766e"/>
      <text x="512" y="312" text-anchor="middle" fill="#ffffff">index</text>
      <circle cx="700" cy="360" r="50" fill="#7c3aed"/>
      <text x="700" y="366" text-anchor="middle" fill="#ffffff">graph</text>
      <circle cx="850" cy="294" r="44" fill="#ea580c"/>
      <text x="850" y="300" text-anchor="middle" fill="#ffffff">review</text>
      <circle cx="608" cy="508" r="50" fill="#be123c"/>
      <text x="608" y="514" text-anchor="middle" fill="#ffffff">memory</text>
      <circle cx="900" cy="484" r="48" fill="#334155"/>
      <text x="900" y="490" text-anchor="middle" fill="#ffffff">failure</text>
    </g>

    <rect x="122" y="552" width="956" height="70" rx="18" fill="#f1f5f9"/>
    <text x="152" y="581" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#334155">Tabs: graph relationships, // rin: debt markers, FailureRecord memories</text>
    <text x="152" y="608" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#334155">Data source: local /api/data, bound to 127.0.0.1, no telemetry</text>
  </g>
</svg>
