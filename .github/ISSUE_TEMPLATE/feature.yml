name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete workflow is blocked or unnecessarily costly?
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current workaround
      description: What do you do today, and why is it insufficient?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Minimum useful outcome
      description: Describe the smallest behavior that would solve the problem.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Local-first constraint
      options:
        - label: This can preserve Jambavan's no-telemetry, no-code-upload default.
          required: true
