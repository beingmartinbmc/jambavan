name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run docs-check
      - run: npm test
      - name: Run coverage on Node 20
        # Node 20 supports coverage collection, but not coverage include/threshold flags.
        if: matrix.node-version == 20
        run: node --require ts-node/register --experimental-test-coverage --test test/*.test.ts
      - name: Run coverage with thresholds
        if: matrix.node-version != 20
        run: npm run coverage
