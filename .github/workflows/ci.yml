name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run docs-check
      - run: npm test
      - name: Run coverage on Node 20
        # Node 20 supports coverage collection, but not coverage include/threshold flags.
        if: matrix.node-version == 20
        run: node --require ts-node/register --experimental-test-coverage --test test/*.test.ts
      - name: Run coverage with thresholds
        if: matrix.node-version != 20
        run: npm run coverage

  macos-smoke:
    name: Node 22 smoke (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run docs-check
      - run: npm run installer-check
      - run: npm run build
      - run: node dist/index.js --help
      - run: npm pack --dry-run

  windows-smoke:
    name: Node 22 smoke (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run docs-check
      - name: Parse installer and run checks in Windows PowerShell 5.1
        shell: powershell
        run: |
          if ($PSVersionTable.PSVersion.Major -ne 5) {
            throw "Expected Windows PowerShell 5.1, found $($PSVersionTable.PSVersion)"
          }
          $tokens = $null
          $parseErrors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path .\install.ps1).Path,
            [ref]$tokens,
            [ref]$parseErrors
          )
          if ($parseErrors.Count -ne 0) {
            $parseErrors | ForEach-Object { Write-Host $_ -ForegroundColor Red }
            throw "install.ps1 contains PowerShell syntax errors"
          }
          npm run installer-check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - run: npm run build
      - run: node dist/index.js --help
      - run: npm pack --dry-run
